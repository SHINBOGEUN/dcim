spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties.hibernate:
      format_sql: true
      use_sql_comment: true
      jdbc.time_zone: UTC
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
