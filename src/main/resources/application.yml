spring:
  application:
    name: new-manager-server
  profiles:
    active: test
server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    try-it-out-enabled: true
    filter: true
    display-request-duration: true

logging:
  level:
    root: ${LOG_LEVEL:INFO}
  file:
    name: ${LOG_FILE_NAME:./logs/application.log}
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_FILE_NAME:./logs/application}-%d{yyyy-MM-dd}.%i.log
      max-file-size: ${LOG_MAX_FILE_SIZE:10MB}
      max-history: ${LOG_MAX_HISTORY:30}
      total-size-cap: ${LOG_TOTAL_SIZE:1GB}

app:
  version: @project.version@

jwt:
  secret: ${JWT_SECRET:lusR6p5tGwGKEWC2rWRYyCVbOzsVOMxMCtxOtHT+V4SiKE8ODJbomdCOl7cy5qbv7JQVHNRPKnwvxhmo9NYmlg==}
  access-token-expiration: ${ACCESS_TOKEN_EXPIRATION:63072000}
  refresh-token-expiration: ${REFRESH_TOKEN_EXPIRATION:78840000}

security:
  auth-enabled: true
